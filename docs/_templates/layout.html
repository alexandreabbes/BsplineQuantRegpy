{% extends "!layout.html" %}
{% block extrahead %}
{{ super() }}
<style>
    .language-switcher {
        float: right;
        margin-top: 10px;
        margin-right: 20px;
    }
    .language-switcher a {
        padding: 5px 10px;
        text-decoration: none;
        color: #2980b9;
    }
    .language-switcher a.active {
        font-weight: bold;
        text-decoration: underline;
        color: #2c3e50;
    }
    .language-switcher a:hover {
        background: #ecf0f1;
        border-radius: 3px;
    }
</style>
{% endblock %}

{% block header %}
<div class="language-switcher">
    <a href="{{ pathto('../../en/index', 1) }}" class="{% if language == 'en' %}active{% endif %}">🇬🇧 English</a>
    <a href="{{ pathto('../../fr/index', 1) }}" class="{% if language == 'fr' %}active{% endif %}">🇫🇷 Français</a>
</div>
{{ super() }}
{% endblock %}
