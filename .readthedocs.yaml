# .readthedocs.yaml
# Configuration pour Read the Docs
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

# Configuration du build
build:
  # Pour Ubuntu 22.04 (ancienne syntaxe)
  os: ubuntu-22.04
  tools:
    python: "3.11"
  
  # Pour les versions plus récentes, utiliser image:
  # image: latest

# Configuration Python
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Configuration Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Formats supplémentaires
formats:
  - htmlzip
  - epub