# .readthedocs.yaml
 
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Commande supplémentaire pour générer les fichiers avant le build
  jobs:
    pre_build:
      - cd docs && sphinx-apidoc -o api/ ../src/BsplineQuantRegpy/ -f -M