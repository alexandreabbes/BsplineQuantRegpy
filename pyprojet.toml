[build-system]
requires = [
    "setuptools>=75.0",
    "wheel>=0.45.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "splinequant"
version = "1.0.1"
description = "Quantile regression with splines under shape constraints"
readme = "README.md"
license = {file = "LICENSE"}
authors = [
    {name = "Alexandre Abbes", email = "alexandre.abbes@proton.me"},
]
maintainers = [
    {name = "Alexandre Abbes", email = "alexandre.abbes@proton.me"},
]
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "numpy>=1.26.0",
    "scipy>=1.14.0",
    "cvxpy>=1.5.0",
    "matplotlib>=3.9.0",
     gurobi = ["cvxpy-gurobi>=1.0.0"],
     clarabel = ["clarabel>=0.8.0"],
]
optional-dependencies = { 
  mosek = ["mosek>=10.0.0"],
  dev = [
        "pytest>=8.0.0",
        "pytest-cov>=5.0.0",
        "black>=24.0.0",
        "ruff>=0.6.0",
        "mypy>=1.10.0",
        "build>=1.2.0",
        "twine>=5.0.0",
    ],
    docs = [
        "sphinx>=7.0.0",
        "sphinx-rtd-theme>=2.0.0",
        "numpydoc>=1.6.0",
        "myst-parser>=3.0.0",
    ],
}

[project.urls]
Homepage = "https://github.com/AlexandreAbbes/BsplineQuantRegpy"
Repository = "https://github.com/AlexandreAbbes/BsplineQuantRegpy.git"
Issues = "https://github.com/AlexandreAbbes/BsplineQuantRegpy/issues"
Documentation = "https://github.com/AlexandreAbbes/BsplineQuantRegpy#readme"

[tool.setuptools]
packages = ["BsplineQuantRegpy"]
include-package-data = true

[project.scripts]
splinequant-gui = "splinequant.gui.main_window:main"

[tool.setuptools.package-data]
splinequant = ["py.typed"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["splinequant*"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --cov=splinequant --cov-report=term-missing"
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311', 'py312', 'py313']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py313"
exclude = [
    ".git",
    "__pycache__",
    ".eggs",
    ".tox",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E203",  # whitespace before ':'
    "W503",  # line break before binary operator
]

[tool.ruff.lint.isort]
profile = "black"
line-length = 88

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Commencer par false puis passer à true
ignore_missing_imports = true
exclude = [
    "build",
    "dist",
    ".eggs",
    ".venv",
    "tests",
]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/__pycache__/*", "*/_version.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "def __repr__",
]
fail_under = 70

[tool.bumpversion]
current_version = "1.0.1"
commit = true
tag = true
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)(?P<release>[a-z]+)?"
serialize = [
    "{major}.{minor}.{patch}{release}",
    "{major}.{minor}.{patch}",
]
search = "__version__ = \"{current_version}\""
replace = "__version__ = \"{new_version}\""
